<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindSprout AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin:0;overflow:hidden">
  <a-scene
    mindar-image="imageTargetSrc:./targets.mind"
    color-space="sRGB"
    renderer="colorManagement:true,physicallyCorrectLights"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-assets>
      <a-asset-item id="myModel" src="./mindsprout_logo_3d.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <a-entity mindar-image-target="targetIndex:0">
      
      <a-gltf-model 
        src="#myModel" 
        position="0 0 0" 
        rotation="0 0 0" 
        scale="0.1 0.1 0.1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-gltf-model>

      <a-text
        value="✨ AR Activated!"
        position="0 0.2 0"
        scale="0.5 0.5 0.5"
        color="#00E5FF"
        align="center"
        animation="property:position;to:0 0.5 0;dir:alternate;loop:true;dur:1500">
      </a-text>

      <a-torus
        position="0 0 0"
        radius="0.4"
        radius-tubular="0.03"
        material="color:#6C63FF;emissive:#6C63FF;opacity:0.7"
        animation="property:rotation;to:0 360 0;loop:true;dur:2000">
      </a-torus>

    </a-entity>
  </a-scene>
</body>
</html>
