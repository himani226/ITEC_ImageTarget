<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindSprout AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <!-- STL Loader -->
  <script src="https://unpkg.com/aframe-stl-model-component/dist/aframe-stl-model-component.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <!-- Assets -->
    <a-assets>

      <!-- 3D STL Model -->
      <a-asset-item
        id="logoModel"
        src="./mindsprout_logo_3d.stl">
      </a-asset-item>

    </a-assets>

    <!-- Camera -->
    <a-camera
      position="0 0 0"
      look-controls="enabled: false">
    </a-camera>

    <!-- Target -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Light -->
      <a-light
        type="ambient"
        color="#ffffff"
        intensity="1">
      </a-light>

      <a-light
        type="directional"
        position="1 2 1"
        intensity="1.5">
      </a-light>

      <!-- 3D Model -->
      <a-entity
        stl-model="#logoModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.01 0.01 0.01"
        material="
          color:#00E5FF;
          metalness:0.4;
          roughness:0.3;
        "
        animation="
          property: rotation;
          to: 0 360 0;
          loop: true;
          dur: 6000;
          easing: linear;
        ">
      </a-entity>

      <!-- Floating Text -->
      <a-text
        value="✨ MindSprout AR Activated!"
        position="0 0.6 0"
        scale="0.5 0.5 0.5"
        align="center"
        color="#00E5FF"
        animation="
          property: position;
          to: 0 0.8 0;
          dir: alternate;
          loop: true;
          dur: 1500;
        ">
      </a-text>

      <!-- Ring Effect -->
      <a-torus
        position="0 0 0"
        radius="0.45"
        radius-tubular="0.02"
        material="
          color:#6C63FF;
          emissive:#6C63FF;
          opacity:0.7;
        "
        animation="
          property: rotation;
          to: 0 360 0;
          loop: true;
          dur: 2500;
          easing: linear;
        ">
      </a-torus>

    </a-entity>

  </a-scene>

</body>
</html>
